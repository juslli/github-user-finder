<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub User Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="card">
      <h1>Buscar Usuário do GitHub</h1>
      <p class="subtitle">Encontre informações públicas de qualquer perfil</p>

      <div class="search-box">
        <input
          type="text"
          id="username"
          placeholder="Digite o nome de usuário"
          autocomplete="off"
        />
        <button id="searchBtn">Buscar</button>
      </div>

      <p id="status" class="status"></p>

      <section id="result" class="result hidden">
        <img id="avatar" src="" alt="Avatar do usuário" class="avatar" />

        <h2 id="name">Nome do usuário</h2>
        <p id="login" class="login">@usuario</p>
        <p id="bio" class="bio">Bio do usuário</p>

        <div class="stats">
          <div class="stat">
            <span id="repos">0</span>
            <small>Repos</small>
          </div>

          <div class="stat">
            <span id="followers">0</span>
            <small>Seguidores</small>
          </div>

          <div class="stat">
            <span id="following">0</span>
            <small>Seguindo</small>
          </div>
        </div>

        <a id="profileLink" href="#" target="_blank" rel="noopener noreferrer">
          Ver perfil no GitHub
        </a>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
